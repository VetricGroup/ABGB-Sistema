<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABGB - Sistema de Órdenes Chef</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="chef.css">
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <div class="logo">AB</div>
                    <div>
                        <h1>Cocina</h1>
                        <span class="time" id="time">09:30</span>
                    </div>
                </div>
                <button class="btn-logout" id="btnLogout">Cerrar Sesión</button>
            </div>
        </header>

        <!-- MAIN -->
        <main class="main">
            <!-- DEBUG PANEL (visible en pantalla) -->
            <div id="debugPanel" style="background: #1a1a1a; border: 2px solid #ffb800; border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 11px; color: #b0b0b0; font-family: monospace;">
                <div style="color: #ffb800; font-weight: bold; margin-bottom: 8px;">🔧 DEBUG STATUS</div>
                <div id="debugFirebase">Firebase: ⏳ Conectando...</div>
                <div id="debugOrders">Órdenes: 0</div>
                <div id="debugMode">Modo: Esperando...</div>
            </div>

            <!-- STATUS BAR -->
            <div class="status-bar">
                <div class="status-item nuevo">
                    <div class="status-count" id="countNuevo">0</div>
                    <div class="status-label">Nuevas</div>
                </div>
                <div class="status-item preparando">
                    <div class="status-count" id="countPreparando">0</div>
                    <div class="status-label">Preparando</div>
                </div>
                <div class="status-item listo">
                    <div class="status-count" id="countListo">0</div>
                    <div class="status-label">Listas</div>
                </div>
            </div>

            <!-- ORDERS CONTAINER -->
            <div class="orders-container">
                <div class="orders-grid" id="ordersGrid">
                    <!-- Las órdenes se cargan aquí -->
                </div>
            </div>
        </main>
    </div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script src="firebaseConfig.js"></script>
    <script src="chef.js"></script>
</body>
</html>
