<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABGB - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <!-- LOGO -->
            <div class="logo-section">
                <div class="logo">AB</div>
                <h1>ABGB BURGERS</h1>
                <p>Sistema de Órdenes Profesional</p>
            </div>

            <!-- FORM -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="role">Selecciona tu rol:</label>
                    <select id="role" required>
                        <option value="">-- Selecciona --</option>
                        <option value="mesero">Mesero</option>
                        <option value="chef">Chef</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>

            <!-- CREDENCIALES DE PRUEBA -->
            <div class="demo-credentials">
                <p class="demo-title">Credenciales de prueba:</p>
                <div class="credential-item">
                    <span class="label">Mesero:</span>
                    <span class="value">mesero123</span>
                </div>
                <div class="credential-item">
                    <span class="label">Chef:</span>
                    <span class="value">chef123</span>
                </div>
                <div class="credential-item">
                    <span class="label">Admin:</span>
                    <span class="value">admin123</span>
                </div>
            </div>

            <!-- ERROR MESSAGE -->
            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <!-- Notificaciones personalizadas -->
    <script src="notifications.js"></script>
    <script src="login.js"></script>
</body>
</html>
